name: Update OSS Contributions
run-name: "${{ github.workflow }} (${{ github.ref_name }})"

on:
  schedule:
    - cron: "0 0 * * 6"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

# Declare default permissions as read only.
permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    name: Update OSS contributions data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # For checkout
      contents: read
      # For PR creation and auto-merge
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Fetch OSS contributions
        id: fetch
        run: |
          set -e
          set -o pipefail

          gh search prs \
            --author "roottool" \
            --merged \
            --visibility "public" \
            --json id,number,title,url,repository,closedAt \
            -- -user:"roottool" \
            > temp-contributions.json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Format and move JSON
        run: |
          bunx oxfmt temp-contributions.json
          mv temp-contributions.json src/assets/oss-contributions.json

      - name: Check for changes
        id: changes
        run: |
          if git diff HEAD --quiet src/assets/oss-contributions.json; then
            echo "changed=false" >> ${GITHUB_OUTPUT}
            echo "No changes detected"
          else
            echo "changed=true" >> ${GITHUB_OUTPUT}
            echo "Changes detected"
          fi

      - name: Generate token
        if: steps.changes.outputs.changed == 'true'
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Data Update PR
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/create-data-update-pr
        with:
          asset-file: src/assets/oss-contributions.json
          branch-prefix: chore/update-oss-contributions
          commit-msg: "chore: update OSS contributions data"
          pr-title: "chore: update OSS contributions data"
          pr-body: |
            ## Summary
            Automatically updated OSS contributions data.

            ## Changes
            - 📊 Updated `src/assets/oss-contributions.json` with the latest merged PR data

            ## Checklist
            - [ ] Data format is correct
            - [ ] New contributions are included
            - [ ] Existing data is preserved

            ---
            🤖 This PR was automatically created by GitHub Actions
          gh-token: ${{ steps.generate_token.outputs.token }}
