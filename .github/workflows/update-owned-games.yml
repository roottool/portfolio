name: Update Owned Games
run-name: "${{ github.workflow }} (${{ github.ref_name }})"

on:
  schedule:
    - cron: "0 0 * * 5"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

# Declare default permissions as read only.
permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    name: Update Owned Games data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # For checkout
      contents: read
      # For PR creation and auto-merge
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Fetch owned games
        id: fetch
        run: |
          set -e
          set -o pipefail

          HTTP_CODE=$(curl -s -w "%{http_code}" -o temp-owned-games.json \
            "https://api.steampowered.com/IPlayerService/GetOwnedGames/v0001/?key=${STEAM_API_KEY}&steamid=${STEAM_ID}&include_appinfo=1&include_played_free_games=1&format=json")

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "Failed to fetch Steam API. HTTP status: ${HTTP_CODE}"
            exit 1
          fi

          # Validate JSON response
          if ! jq '.response | has("game_count") and has("games")' temp-owned-games.json | grep -q true; then
            echo "Invalid Steam API response structure"
            exit 1
          fi
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ vars.STEAM_ID }}

      - name: Format and move JSON
        run: |
          bunx oxfmt temp-owned-games.json
          mv temp-owned-games.json src/assets/owned-games.json

      - name: Check for changes
        id: changes
        run: |
          if git diff HEAD --quiet src/assets/owned-games.json; then
            echo "changed=false" >> ${GITHUB_OUTPUT}
            echo "No changes detected"
          else
            echo "changed=true" >> ${GITHUB_OUTPUT}
            echo "Changes detected"
          fi

      - name: Generate token
        if: steps.changes.outputs.changed == 'true'
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create Data Update PR
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/create-data-update-pr
        with:
          asset-file: src/assets/owned-games.json
          branch-prefix: chore/update-owned-games
          commit-msg: "chore: update owned games data"
          pr-title: "chore: update owned games data"
          pr-body: |
            ## Summary

            Automatically updated owned games data from Steam API.

            ## Changes

            - 🎮 Updated `src/assets/owned-games.json` with the latest owned games data from Steam Web API

            ## Checklist

            - [ ] Data format is correct
            - [ ] Game count is reasonable
            - [ ] Existing data structure is preserved

            ---

            🤖 This PR was automatically created by GitHub Actions
          gh-token: ${{ steps.generate_token.outputs.token }}
