name: CI
run-name: "${{ github.workflow }} (${{ github.ref_name }})"
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
      renovate-config: ${{ steps.filter.outputs.renovate-config }}
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Check diff targets by path filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            typescript:
              - 'bun.lock'
              - '**/tsconfig*.json'
              - '**/*.astro'
              - '**/*.ts'
              - '**/*.tsx'
            renovate-config:
              - '.github/renovate.json'

  renovate-config-lint:
    name: Renovate config lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup]
    if: ${{ needs.setup.outputs.renovate-config == 'true' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/actions/setup-environment/action.yml
            .github/renovate.json
            package.json
            bun.lock
            dprint.jsonc
          sparse-checkout-cone-mode: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Check format by dprint
        run: bunx dprint check .github/renovate.json

      - name: Validate Renovate config
        run: bunx -p renovate renovate-config-validator --strict

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Run format check
        run: bun run lint:dprint

      - name: Generate Astro types
        run: bunx astro sync

      - name: Run lint
        run: bun run lint:eslint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [setup]
    if: ${{ needs.setup.outputs.typescript == 'true' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Run astro check
        run: bun run typecheck:astro

      - name: Run type check
        run: bun run typecheck:tsc

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize
        uses: ./.github/actions/setup-environment

      - name: Run build
        run: bun run build

  # test:
  #   name: Test
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5
  #   needs: [lint, typecheck]
  #   steps:
  #     - name: Checkout Repository
  #       uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
  #       with:
  #         persist-credentials: false

  #     - name: Initialize
  #       uses: ./.github/actions/setup-environment

  #     - name: Run test
  #       run: bun run test

  #     - name: Upload coverage to Codecov
  #       uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7 # v5.5.1
  #       with:
  #         token: ${{ secrets.CODECOV_TOKEN }}
  #         fail_ci_if_error: true

  gatekeeper:
    name: Gatekeeper
    runs-on: ubuntu-slim
    timeout-minutes: 1
    needs:
      - setup
      - lint
      - typecheck
      - build
      # - test
      - renovate-config-lint
    if: always() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
    steps:
      - run: exit 1
